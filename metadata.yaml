   - sha: b8d6224a04d196906fd32b9cdfb826db5059bd9b
     changeNotes: |
      Version 0.1.0
      Initial release.
      - Server-side template for Opera Ads Marketing API.
      - Accepts GA4-style incoming events and forwards a flat JSON
        payload to https://px.oa.opera.com/s.
      - Auto-resolves clickId from URL (opera_click_id / opcid),
        same-domain referrer, or opcid cookie.
      - Reads advertiserUserId from the OAU first-party cookie.
      - Auto-aggregates product / order / custom properties into the
        eventData JSON string.
      - Auto-generates eventId when not provided.
